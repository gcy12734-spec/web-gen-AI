<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Car Sale | Seller Registration</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="animated-bg">

    <header class="site-header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <div class="logo-placeholder">OCS</div>
                <span class="logo-text">Online Car Sale</span>
            </a>
            <nav class="main-nav" id="main-nav">
                <button id="theme-toggle" class="btn btn-outline" style="padding: 5px 10px; margin-right: 15px;">🌓</button>
                <ul class="nav-list">
                    <li><a href="search.html" class="nav-link">Search</a></li>
                    <li class="auth-required hidden"><a href="add-car.html" class="nav-link">Add Car</a></li>
                    <li class="guest-only"><a href="log-in.html" class="nav-link">Login</a></li>
                    <li class="guest-only"><a href="registration.html" class="nav-link btn-primary">Registration</a></li>
                </ul>
            </nav>
            <div class="user-menu" id="userMenu">
                <div class="avatar" id="userAvatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="avatar-dropdown" id="avatarDropdown"></div>
            </div>
            <button class="mobile-menu-toggle" id="mobile-menu-toggle"><span></span><span></span><span></span></button>
        </div>
    </header>

    <div class="registration-container">
        <div class="form-card">
            <div class="form-header">
                <h2 style="color: var(--text-main);">Seller Registration</h2>
                <p style="color: var(--text-muted);">Create an account to start selling your cars.</p>
            </div>

            <form id="registrationForm" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="e.g., John Doe">
                    <span class="error-message" id="fullNameError"></span>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="e.g., 123 Main Street">
                    <span class="error-message" id="addressError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (China)</label>
                    <input type="text" id="phone" name="phone" placeholder="e.g., 13812345678">
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email" name="email" placeholder="e.g., user@domain.com">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Min. 6 alphanumeric chars">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 6 alphanumeric chars">
                    <div class="strength-meter">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <span class="strength-text" id="strengthText">Strength: None</span>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Register Account</button>
                
                <p style="text-align: center; margin-top: 20px; color: var(--text-main);">
                    Already have an account? <a href="log-in.html">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <script src="js/auth-state.js"></script>
    <script src="js/validation.js"></script>
</body>
</html>
