<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Car Sale | Seller Registration</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="bg-light animated-bg">

    <header class="site-header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <div class="logo-placeholder">OCS</div>
                <span class="logo-text">Online Car Sale</span>
            </a>

            <nav class="main-nav" id="main-nav">
                <ul class="nav-list">
                    <li><a href="search.html" class="nav-link">Search</a></li>
                    <li class="auth-required hidden"><a href="add-car.html" class="nav-link">Add Car</a></li>
                    <li class="guest-only"><a href="log-in.html" class="nav-link">Login</a></li>
                    <li class="guest-only"><a href="registration.html" class="nav-link btn-primary">Registration</a></li>
                </ul>
            </nav>

            <div class="user-menu" id="userMenu">
                <div class="avatar" id="userAvatar" aria-label="User Menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="avatar-dropdown" id="avatarDropdown"></div>
            </div>

            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle navigation menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <div class="registration-container">
        <div class="form-card">
            <div class="form-header">
                <h2>Seller Registration</h2>
                <p>Create an account to start selling your cars.</p>
            </div>

            <form id="registrationForm" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="e.g., John Doe">
                    <span class="error-message" id="fullNameError"></span>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="e.g., 123 Main Street">
                    <span class="error-message" id="addressError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (China)</label>
                    <input type="text" id="phone" name="phone" placeholder="e.g., 13812345678">
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email" name="email" placeholder="e.g., user@example.com">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Min. 6 alphanumeric chars">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 6 alphanumeric chars">
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Register Account</button>
                
                <p class="form-footer" style="margin-top: 20px;">
                    Already have an account? <a href="log-in.html">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <footer class="site-footer">
    <div class="container">
        <h4 class="footer-brand-title">Official Brand Partners</h4>
        <div class="brand-grid">
            <a href="https://www.toyota.com" target="_blank" class="brand-link">TOYOTA</a>
            <a href="https://www.bmw.com" target="_blank" class="brand-link">BMW</a>
            <a href="https://www.audi.com" target="_blank" class="brand-link">AUDI</a>
            <a href="https://www.tesla.com" target="_blank" class="brand-link">TESLA</a>
            <a href="https://www.mercedes-benz.com" target="_blank" class="brand-link">MERCEDES</a>
            <a href="https://www.porsche.com" target="_blank" class="brand-link">PORSCHE</a>
        </div>
    </div>
</footer>

    <script src="js/validation.js"></script>
    <script src="js/auth-state.js"></script>
</body>
</html>
