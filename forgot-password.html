<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Car Sale | Recover Password</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body class="animated-bg">

    <header class="site-header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <div class="logo-placeholder">OCS</div>
                <span class="logo-text">Online Car Sale</span>
            </a>
            <button id="theme-toggle" class="btn btn-outline" style="padding: 5px 10px;">🌓</button>
        </div>
    </header>

    <div class="auth-container">
        <div class="form-card">
            <div class="form-header">
                <h2 style="color: var(--text-main);">Recover Password</h2>
                <p style="color: var(--text-muted);">Enter your email to receive a verification code.</p>
            </div>

            <form id="recoveryForm">
                <div class="form-group">
                    <label for="recoveryEmail">Email Address</label>
                    <input type="email" id="recoveryEmail" placeholder="e.g., user@domain.com" required>
                </div>
                
                <div class="form-group">
                    <label for="verifyCode">Verification Code</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="verifyCode" placeholder="6-digit code" required>
                        <button type="button" class="btn btn-outline" onclick="alert('Mock Verification Code Sent to Email!')">Send Code</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full" onclick="event.preventDefault(); alert('Password successfully reset.'); window.location.href='log-in.html';">Reset Password</button>
                
                <p style="text-align: center; margin-top: 20px;">
                    <a href="log-in.html">&larr; Back to Login</a>
                </p>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <h4 class="footer-brand-title">Official Brand Partners</h4>
            <div class="brand-grid">
                <a href="https://www.toyota.com" target="_blank" class="brand-link">TOYOTA</a>
                <a href="https://www.bmw.com" target="_blank" class="brand-link">BMW</a>
                <a href="https://www.audi.com" target="_blank" class="brand-link">AUDI</a>
                <a href="https://www.tesla.com" target="_blank" class="brand-link">TESLA</a>
                <a href="https://www.mercedes-benz.com" target="_blank" class="brand-link">MERCEDES</a>
                <a href="https://www.porsche.com" target="_blank" class="brand-link">PORSCHE</a>
            </div>
        </div>
    </footer>
    
    <script src="js/auth-state.js"></script>
</body>
</html>
