<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Car Sale | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="auth-container">
        <div class="form-card">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" name="loginUsername" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Login</button>
                
                <p class="form-footer">
                    Don't have an account? <a href="registration.html">Register here</a>
                </p>
                <p class="form-footer" style="margin-top: 10px;">
                    <a href="index.html">← Back to Home</a>
                </p>
            </form>
        </div>
    </div>

</body>
</html>
