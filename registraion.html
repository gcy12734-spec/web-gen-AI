<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Car Sale | Seller Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="registration-container">
        <div class="form-card">
            <div class="form-header">
                <h2>Seller Registration</h2>
                <p>Create an account to start selling your cars.</p>
            </div>

            <form id="registrationForm" novalidate>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="e.g., John Doe">
                    <span class="error-message" id="fullNameError"></span>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="e.g., 123 Main Street">
                    <span class="error-message" id="addressError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (China)</label>
                    <input type="text" id="phone" name="phone" placeholder="e.g., 13812345678">
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email" name="email" placeholder="e.g., user@example.com">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Min. 6 alphanumeric chars">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min. 6 alphanumeric chars">
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Register Account</button>
                
                <p class="form-footer">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <script src="validation.js"></script>
</body>
</html>
