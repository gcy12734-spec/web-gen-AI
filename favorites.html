<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Car Sale | My Favorites</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>

    <header class="site-header">
        <div class="container header-container">
            <a href="index.html" class="logo"><div class="logo-placeholder">OCS</div><span class="logo-text">Online Car Sale</span></a>
            <nav class="main-nav" id="main-nav">
                <button id="theme-toggle" class="btn btn-outline" style="padding: 5px 10px; margin-right: 15px;">🌓</button>
                <ul class="nav-list">
                    <li><a href="search.html" class="nav-link">Search</a></li>
                    <li class="auth-required hidden"><a href="add-car.html" class="nav-link">Add Car</a></li>
                    <li class="guest-only"><a href="log-in.html" class="nav-link">Login</a></li>
                    <li class="guest-only"><a href="registration.html" class="nav-link btn-primary">Registration</a></li>
                </ul>
            </nav>
            <div class="user-menu" id="userMenu">
                <div class="avatar" id="userAvatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <div class="avatar-dropdown" id="avatarDropdown"></div>
            </div>
            <button class="mobile-menu-toggle" id="mobile-menu-toggle"><span></span><span></span><span></span></button>
        </div>
    </header>

    <main class="container py-xl">
        <section class="results-section">
            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
                <h2 style="color: var(--text-main); font-size: 2rem; margin: 0;">❤️ My Wishlist</h2>
                <span style="color: var(--text-muted); background: var(--border); padding: 4px 12px; border-radius: 20px; font-size: 0.9rem;" id="favCount">0 items</span>
            </div>
            
            <div id="carGrid" class="car-grid"></div>
            
            <div id="noResults" style="display: none; text-align: center; padding: 60px 20px; background: var(--bg-card); border-radius: 12px; border: 1px dashed var(--border);">
                <div style="font-size: 4rem; margin-bottom: 15px; opacity: 0.5;">📭</div>
                <h3 style="color: var(--text-main); margin-bottom: 10px;">Your wishlist is empty</h3>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Start exploring and save your favorite cars here!</p>
                <a href="search.html" class="btn btn-primary">Browse Cars</a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <h4 class="footer-brand-title">Official Brand Partners</h4>
            <div class="brand-grid">
                <a href="https://www.toyota.com" target="_blank" class="brand-link">TOYOTA</a>
                <a href="https://www.bmw.com" target="_blank" class="brand-link">BMW</a>
                <a href="https://www.audi.com" target="_blank" class="brand-link">AUDI</a>
                <a href="https://www.tesla.com" target="_blank" class="brand-link">TESLA</a>
            </div>
        </div>
    </footer>

    <script src="js/auth-state.js"></script>
    <script src="js/data.js"></script>
    <script src="js/favorites.js"></script>
</body>
</html>
